<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Quazii ❤️</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(120deg, #ff9a9e, #fad0c4, #ffd1ff, #a1c4fd);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        color: white;
        text-align: center;
    }

    @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    h1 {
        font-family: 'Pacifico', cursive;
        font-size: 60px;
        margin-top: 50px;
        text-shadow: 2px 2px 15px #ff4b7d;
    }

    #mainText {
        font-size: 24px;
        margin: 20px auto;
        width: 70%;
        line-height: 1.6;
        color: #fff;
        text-shadow: 2px 2px 8px #ff4b7d;
    }

    button {
        padding: 12px 25px;
        margin: 15px;
        border: none;
        border-radius: 20px;
        background: white;
        color: #ff4b7d;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
        background: #ffe6eb;
    }

    #options {
        display: none;
        margin-top: 40px;
    }

    #result {
        margin-top: 30px;
        font-size: 28px;
        animation: fadeIn 1s;
        text-shadow: 2px 2px 8px #ff4b7d;
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }

    /* floating hearts */
    .heart {
        position: absolute;
        color: red;
        animation: float 5s linear infinite;
        user-select: none;
    }

    @keyframes float {
        from {transform: translateY(100vh);}
        to {transform: translateY(-10vh);}
    }

    /* side box with picture */
    .side-box {
        position: fixed;
        top: 100px;
        right: 50px;
        width: 250px;
        height: 350px;
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 0 20px #ff4b7d;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        animation: floatBox 3s ease-in-out infinite alternate;
    }

    .side-box img {
        width: 90%;
        border-radius: 15px;
        box-shadow: 0 0 15px #ff4b7d;
    }

    .side-box p {
        color: white;
        font-size: 18px;
        margin-top: 10px;
        text-shadow: 2px 2px 8px #ff4b7d;
    }

    @keyframes floatBox {
        0% {transform: translateY(0);}
        100% {transform: translateY(-20px);}
    }

</style>
</head>
<body>

<h1>Quazii ❤️</h1>
<p id="mainText"></p>

<div id="options">
    <button onclick="showMessage(1)">Our Moments 💕</button>
    <button onclick="showMessage(2)">Why You ❤️</button>
    <button onclick="showMessage(3)">My Promise 💖</button>
</div>

<p id="result"></p>

<!-- Side box with picture -->
<div class="side-box">
    <img src="quazii.png" alt="Quazii">
    <p>Quazii ❤️</p>
</div>

<script>
    const text = "Quazii... 💖\n\n" +
    "These 3 months with you feel like the most beautiful dream I never want to wake up from... 🥺\n\n" +
    "You came into my life and suddenly everything became softer, brighter, and full of love... 🌸\n\n" +
    "Your smile, your voice, your little things... everything about you makes my heart fall for you again and again... 💕\n\n" +
    "I didn’t just find a girlfriend in you... I found my peace, my happiness, my everything... ❤️";

    let i = 0;

    function typeEffect() {
        if (i < text.length) {
            document.getElementById("mainText").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeEffect, 40);
        }
    }

    typeEffect();

    // show buttons after 3 minutes (for testing: 3000ms)
    setTimeout(() => {
        document.getElementById("options").style.display = "block";
    }, 3000); // change to 180000 for final 3 min

    function showMessage(num) {
        let message = "";

        if (num === 1) {
            message = "Every moment with you, Quazii, feels like magic... ✨ Even the smallest talks with you become my favorite memories... 💕";
        } 
        else if (num === 2) {
            message = "I love you because you're you, Quazii... 💖 Your heart, your care, your love... everything makes you perfect for me 🥺";
        } 
        else if (num === 3) {
            message = "I promise to stand by you, love you, and choose you every single day, Quazii... no matter what ❤️";
        }

        document.getElementById("result").innerHTML = message;
    }

    // floating hearts
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 20 + "px";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
