<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>৩ মাস। আমাদের গল্প।</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Noto+Serif+Bengali:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fffafb;
            --text-color: #4a4a4a;
            --accent-color: #ff4d6d;
            --soft-pink: #ffeef2;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', 'Noto Serif Bengali', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Falling Hearts Background */
        .heart-particle {
            position: fixed;
            top: -10px;
            pointer-events: none;
            color: rgba(255, 77, 109, 0.5);
            animation: fall linear forwards;
            z-index: 1000;
        }

        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s ease-out;
        }

        .section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        h1 {
            font-family: 'Noto Serif Bengali', serif;
            font-size: 3.2rem;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        h2 { font-family: 'Noto Serif Bengali', serif; font-size: 2rem; color: #d81b60; }

        p { font-size: 1.1rem; max-width: 650px; line-height: 1.8; }

        /* Polaroid Gallery */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 40px;
        }

        .polaroid {
            background: white;
            padding: 12px 12px 25px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transform: rotate(-2deg);
            transition: 0.3s;
            width: 260px;
        }

        .polaroid:nth-child(even) { transform: rotate(3deg); }

        .polaroid img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border: 1px solid #f0f0f0;
        }

        .polaroid .caption {
            font-family: 'Noto Serif Bengali', serif;
            margin-top: 15px;
            font-size: 1.2rem;
            color: #555;
        }

        .polaroid:hover { transform: scale(1.08) rotate(0deg); z-index: 5; }

        /* Timer Section */
        .timer-container {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .timer-box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.1);
            min-width: 80px;
        }

        .timer-box span {
