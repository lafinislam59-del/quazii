<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* card */
.card {
    background: rgba(255,255,255,0.1);
    padding: 50px;
    border-radius: 25px;
    backdrop-filter: blur(15px);
    text-align: center;
    color: white;
    width: 350px;
    animation: fadeIn 1.5s;
}

/* text */
h1 {
    font-size: 40px;
    margin-bottom: 20px;
}

p {
    font-size: 20px;
    line-height: 1.6;
}

/* button */
button {
    margin-top: 25px;
    padding: 12px 25px;
    border: none;
    border-radius: 20px;
    font-size: 18px;
    cursor: pointer;
    background: white;
    color: #ff4b7d;
}

/* heart animation */
.heart {
    font-size: 70px;
    margin-top: 20px;
    animation: beat 1s infinite;
}

@keyframes beat {
    0% {transform: scale(1);}
    50% {transform: scale(1.3);}
    100% {transform: scale(1);}
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

</style>
</head>

<body>

<div class="card" id="card">

    <h1>Hey ❤️</h1>

    <p id="text">
        It’s been 3 months with you…  
        And honestly…  
        I didn’t expect someone to become this important to me… 💭
    </p>

    <button onclick="next()">Continue</button>

</div>

<script>

function next() {
    const card = document.getElementById("card");

    card.innerHTML = `
        <h1>3 Months 💖</h1>

        <p>
        In just 3 months…  
        You became my comfort… my happiness…  

        And somehow…  
        You became the person I never want to lose… ❤️
        </p>

        <button onclick="finalPage()">One more thing...</button>
    `;
}

function finalPage() {
    const card = document.getElementById("card");

    card.innerHTML = `
        <div class="heart">❤️</div>

        <h1>I Love You</h1>

        <p>
        Happy 3 months… 💕  

        If I had to choose again…  
        I would still choose you…  

        Every single time… ✨
        </p>
    `;
}

</script>

</body>
</html>
