<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Quazii ❤️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Sacramento&display=swap');

body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: #0f0c29;
    color: white;
}

/* glowing background */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.blob {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, #ff4b7d, transparent);
    border-radius: 50%;
    filter: blur(120px);
    animation: move 12s infinite alternate;
}

.blob:nth-child(2){ left:60%; top:40%; }
.blob:nth-child(3){ left:30%; top:70%; }

@keyframes move {
    from {transform: translate(0,0);}
    to {transform: translate(120px,-120px);}
}

/* pages */
#mainPage, #secondPage {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
}

/* title */
h1 {
    font-family: 'Pacifico', cursive;
    font-size: 80px;
    margin-top: 40px;
}

/* main text */
#mainText {
    font-family: 'Sacramento', cursive;
    font-size: 40px;
    width: 70%;
    margin: auto;
    line-height: 2;
}

/* buttons */
button {
    padding: 15px 30px;
    margin: 10px;
    border-radius: 25px;
    border: none;
    font-size: 20px;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.2);
    background: rgba(255,255,255,0.3);
}

/* second page */
#secondPage {
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    animation: fadeIn 1s;
}

.bigText {
    font-size: 48px;
    width: 70%;
    line-height: 2;
    font-family: 'Sacramento', cursive;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* hand animation */
.hand {
    position: fixed;
    font-size: 90px;
    left: -150px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 9999;
    animation: handMove 2s forwards;
}

@keyframes handMove {
    0% {left: -150px;}
    100% {left: 40%;}
}

</style>
</head>

<body>

<div class="bg">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
</div>

<!-- MAIN PAGE -->
<div id="mainPage">
    <h1>Quazii ❤️</h1>
    <p id="mainText"></p>

    <div id="options" style="display:none;">
        <button onclick="startAnimation(1)">Our Moments 💕</button>
        <button onclick="startAnimation(2)">Why You ❤️</button>
        <button onclick="startAnimation(3)">My Promise 💖</button>
    </div>
</div>

<!-- SECOND PAGE -->
<div id="secondPage">
    <p id="bigMessage" class="bigText"></p>
</div>

<script>

// typing text
const text = `Quazii... 💖

You're my peace...
My happiness...
My everything... ✨`;

let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("mainText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 40);
    }
}
typeEffect();

// show buttons
setTimeout(()=>{
    document.getElementById("options").style.display="block";
},3000);

// animation + page switch
function startAnimation(num) {

    // remove old hand if exists
    const oldHand = document.querySelector(".hand");
    if(oldHand) oldHand.remove();

    const hand = document.createElement("div");
    hand.className = "hand";
    hand.innerHTML = "🤲🌹";
    document.body.appendChild(hand);

    // fade main page
    setTimeout(()=>{
        document.getElementById("mainPage").style.opacity = "0";
    },1500);

    setTimeout(()=>{
        document.getElementById("mainPage").style.display = "none";

        const second = document.getElementById("secondPage");
        second.style.display = "flex";

        let msg = "";

        if(num===1){
            msg = `Every moment with you feels like a dream... 💕

From random laughs to deep late night talks...
Every second becomes something unforgettable...

With you...
Life feels perfect... ✨`;
        }
        else if(num===2){
            msg = `I love you for everything you are... ❤️

The way you smile...
The way you care...
The way you make my world brighter...

You're my favorite feeling... 🌸`;
        }
        else{
            msg = `I promise to always stay with you... 💖

Through every hard time...
Through every happy moment...

I will choose you...
Again and again...
Every single day... ✨`;
        }

        document.getElementById("bigMessage").innerHTML = msg;

    },2500);
}

</script>

</body>
</html>
