<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Quazii ❤️</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Sacramento&display=swap');

    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ffd6e8, #ffebf7, #ffe6f0, #fff0f5);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite alternate;
        color: white;
        text-align: center;
    }

    @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    h1 {
        font-family: 'Pacifico', cursive;
        font-size: 80px;
        margin-top: 40px;
        text-shadow: 3px 3px 20px #ff4b7d;
    }

    #mainText {
        font-family: 'Sacramento', cursive;
        font-size: 32px;
        margin: 20px auto;
        width: 80%;
        line-height: 1.8;
        color: #fff;
        text-shadow: 3px 3px 12px #ff4b7d;
    }

    button {
        padding: 15px 35px;
        margin: 20px;
        border: none;
        border-radius: 25px;
        background: white;
        color: #ff4b7d;
        font-size: 22px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
    }

    button:hover {
        transform: scale(1.15);
        background: #ffe6eb;
    }

    #options {
        display: none;
        margin-top: 40px;
    }

    #result {
        margin-top: 30px;
        font-size: 36px;
        animation: fadeIn 1s;
        text-shadow: 3px 3px 12px #ff4b7d;
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }

    /* Floating hearts */
    .heart {
        position: absolute;
        color: #ff4b7d;
        animation: float 6s linear infinite;
        user-select: none;
    }

    @keyframes float {
        0% {transform: translateY(100vh);}
        100% {transform: translateY(-10vh);}
    }

    /* Floating bubbles */
    .bubble {
        position: absolute;
        width: 20px;
        height: 20px;
        background: rgba(255, 192, 203, 0.5);
        border-radius: 50%;
        animation: rise 8s linear infinite;
    }

    @keyframes rise {
        0% {transform: translateY(100vh) scale(1);}
        50% {transform: scale(1.3);}
        100% {transform: translateY(-10vh) scale(0.8);}
    }

</style>
</head>
<body>

<h1>Quazii ❤️</h1>
<p id="mainText"></p>

<div id="options">
    <button onclick="showMessage(1)">Our Moments 💕</button>
    <button onclick="showMessage(2)">Why You ❤️</button>
    <button onclick="showMessage(3)">My Promise 💖</button>
</div>

<p id="result"></p>

<script>
    // Big cute English song-style romantic message
    const text = `"Quazii... 💖\n
You are the melody in my heart, the sunshine in my soul... 🌸\n
Every laugh, every smile, every little thing about you... makes my world brighter... ✨\n
I never knew love until I met you, and now my heart dances to your rhythm... 💕\n
Forever yours, forever mine, forever us... ❤️"`;

    let i = 0;

    function typeEffect() {
        if (i < text.length) {
            document.getElementById("mainText").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeEffect, 45);
        }
    }

    typeEffect();

    // Show buttons after 3 min (for test 3000ms)
    setTimeout(() => {
        document.getElementById("options").style.display = "block";
    }, 3000); // change 180000 for 3 min

    function showMessage(num) {
        let message = "";
        if (num === 1) {
            message = `"Every moment with you is like a lyric from my favorite song... 🎵💖 Dancing in our little world of love..."`;
        } else if (num === 2) {
            message = `"I love you because you make even the smallest moments magical... 🌸 Your smile, your care, your soul ❤️"`;
        } else if (num === 3) {
            message = `"I promise to hold your hand through every storm, to laugh with you, love you, and choose you every day... 💕✨"`;
        }
        document.getElementById("result").innerHTML = message;
    }

    // Floating hearts
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 30 + 30 + "px";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 400);

    // Floating bubbles
    function createBubble() {
        const bubble = document.createElement("div");
        bubble.classList.add("bubble");
        bubble.style.left = Math.random() * 100 + "vw";
        bubble.style.width = bubble.style.height = (Math.random() * 15 + 15) + "px";
        document.body.appendChild(bubble);
        setTimeout(() => bubble.remove(), 8000);
    }
    setInterval(createBubble, 500);

</script>

</body>
</html>
