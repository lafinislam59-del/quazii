<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Quazii ❤️</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        overflow: hidden;
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        color: white;
    }

    .container {
        margin-top: 100px;
        padding: 20px;
    }

    h1 {
        font-size: 50px;
        animation: fadeIn 3s;
    }

    #mainText {
        font-size: 22px;
        width: 70%;
        margin: auto;
        line-height: 1.6;
    }

    button {
        padding: 12px 25px;
        margin: 15px;
        border: none;
        border-radius: 20px;
        background: white;
        color: #ff4b7d;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
        background: #ffe6eb;
    }

    #options {
        display: none;
        margin-top: 40px;
    }

    #result {
        margin-top: 30px;
        font-size: 24px;
        animation: fadeIn 1s;
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }

    /* floating hearts */
    .heart {
        position: absolute;
        color: red;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        from {transform: translateY(100vh);}
        to {transform: translateY(-10vh);}
    }

</style>

</head>

<body>

<div class="container">

    <h1>Quazii ❤️</h1>

    <p id="mainText"></p>

    <div id="options">
        <button onclick="showMessage(1)">Our Moments 💕</button>
        <button onclick="showMessage(2)">Why You ❤️</button>
        <button onclick="showMessage(3)">My Promise 💖</button>
    </div>

    <p id="result"></p>

</div>

<script>
    const text = "Quazii... 💖\n\n" +
    "These 3 months with you feel like the most beautiful dream I never want to wake up from... 🥺\n\n" +
    "You came into my life and suddenly everything became softer, brighter, and full of love... 🌸\n\n" +
    "Your smile, your voice, your little things... everything about you makes my heart fall for you again and again... 💕\n\n" +
    "I didn’t just find a girlfriend in you... I found my peace, my happiness, my everything... ❤️";

    let i = 0;

    function typeEffect() {
        if (i < text.length) {
            document.getElementById("mainText").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeEffect, 40);
        }
    }

    typeEffect();

    // show buttons after 3 minutes
    setTimeout(() => {
        document.getElementById("options").style.display = "block";
    }, 180000);

    function showMessage(num) {
        let message = "";

        if (num === 1) {
            message = "Every moment with you, Quazii, feels like magic... ✨ Even the smallest talks with you become my favorite memories... 💕";
        } 
        else if (num === 2) {
            message = "I love you because you're you, Quazii... 💖 Your heart, your care, your love... everything makes you perfect for me 🥺";
        } 
        else if (num === 3) {
            message = "I promise to stand by you, love you, and choose you every single day, Quazii... no matter what ❤️";
        }

        document.getElementById("result").innerHTML = message;
    }

    // floating hearts animation
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 20 + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }

    setInterval(createHeart, 300);

</script>

</body>
</html>
