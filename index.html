<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Quazii ❤️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Sacramento&display=swap');

body {
    margin: 0;
    overflow: hidden;
    text-align: center;
    font-family: 'Segoe UI', sans-serif;
    background: #0f0c29;
    color: white;
}

/* Animated glowing blobs */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: -1;
}

.blob {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, #ff4b7d, transparent);
    border-radius: 50%;
    filter: blur(120px);
    animation: move 15s infinite alternate ease-in-out;
}

.blob:nth-child(2) {
    left: 60%;
    top: 40%;
    animation-delay: 3s;
}

.blob:nth-child(3) {
    left: 30%;
    top: 70%;
    animation-delay: 6s;
}

@keyframes move {
    0% {transform: translate(0,0);}
    100% {transform: translate(100px, -150px);}
}

h1 {
    font-family: 'Pacifico', cursive;
    font-size: 80px;
    margin-top: 40px;
    text-shadow: 0 0 25px #ff4b7d;
}

#mainText {
    font-family: 'Sacramento', cursive;
    font-size: 42px;
    width: 75%;
    margin: auto;
    line-height: 2;
    text-shadow: 0 0 15px #ff4b7d;
}

button {
    padding: 15px 35px;
    margin: 15px;
    border-radius: 30px;
    border: none;
    font-size: 20px;
    cursor: pointer;
    background: rgba(255,255,255,0.15);
    color: white;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

button:hover {
    transform: scale(1.2);
    background: rgba(255,255,255,0.3);
}

#options {
    display: none;
    margin-top: 40px;
}

#result {
    font-size: 40px;   /* 🔥 BIGGER TEXT */
    width: 70%;
    margin: 30px auto;
    line-height: 1.8;
    text-shadow: 0 0 12px #ff4b7d;
    animation: fadeIn 0.8s;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* Floating hearts */
.heart {
    position: absolute;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* Sparkles */
.sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    animation: sparkle 3s infinite;
}

@keyframes sparkle {
    0% {opacity: 0;}
    50% {opacity: 1;}
    100% {opacity: 0;}
}

</style>
</head>

<body>

<div class="bg">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
</div>

<h1>Quazii ❤️</h1>
<p id="mainText"></p>

<div id="options">
    <button onclick="showMessage(1)">Our Moments 💕</button>
    <button onclick="showMessage(2)">Why You ❤️</button>
    <button onclick="showMessage(3)">My Promise 💖</button>
</div>

<p id="result"></p>

<script>

const text = `Quazii... 💖

You're not just someone I love...
You're my peace, my happiness, my everything... ✨

Every second with you feels unreal...
Like I'm living inside a dream I never want to wake up from... 💕

I didn't find love...
I found YOU... ❤️`;

let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("mainText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 40);
    }
}
typeEffect();

setTimeout(() => {
    document.getElementById("options").style.display = "block";
}, 3000);

function showMessage(num) {
    let message = "";

    if (num === 1) {
        message = `Every moment with you feels like a beautiful song... 🎶💖

From random laughs to deep talks at night...
Every second becomes a memory I never want to lose...

With you... even silence feels magical... ✨`;
    } 
    else if (num === 2) {
        message = `I love you not just for who you are...
But for how you make me feel... ❤️

You turn ordinary days into something special...
And your smile... it's my favorite place in the world... 🌸`;
    } 
    else {
        message = `I promise to stay beside you no matter what... 💖

To love you in your best days and your worst days...
To never give up on us...

And to choose you...
Again and again...
Every single day... ✨`;
    }

    document.getElementById("result").innerHTML = message;
}

// hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 25 + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 400);

// sparkles
function createSparkle() {
    const sp = document.createElement("div");
    sp.classList.add("sparkle");
    sp.style.left = Math.random() * 100 + "vw";
    sp.style.top = Math.random() * 100 + "vh";
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 3000);
}
setInterval(createSparkle, 200);

</script>

</body>
</html>
