<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Quazii ❤️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Sacramento&display=swap');

body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: #0f0c29;
    color: white;
}

/* background glow */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.blob {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, #ff4b7d, transparent);
    border-radius: 50%;
    filter: blur(120px);
    animation: move 15s infinite alternate;
}

@keyframes move {
    from {transform: translate(0,0);}
    to {transform: translate(120px,-120px);}
}

/* main page */
#mainPage {
    transition: 1s;
}

h1 {
    font-family: 'Pacifico', cursive;
    font-size: 80px;
    margin-top: 40px;
}

#mainText {
    font-family: 'Sacramento', cursive;
    font-size: 40px;
    width: 70%;
    margin: auto;
    line-height: 2;
}

button {
    padding: 15px 30px;
    margin: 10px;
    border-radius: 25px;
    border: none;
    font-size: 20px;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
}

/* new page */
#secondPage {
    display: none;
    position: absolute;
    top: 0;
    width: 100%;
    height: 100%;
    animation: fadeIn 1s;
}

.bigText {
    font-size: 42px;
    width: 70%;
    margin: 100px auto;
    line-height: 2;
    font-family: 'Sacramento', cursive;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* animated hand */
.hand {
    position: absolute;
    font-size: 80px;
    left: -100px;
    top: 50%;
    transform: translateY(-50%);
    animation: handMove 2s forwards;
}

@keyframes handMove {
    to {left: 50%;}
}

</style>
</head>

<body>

<div class="bg">
    <div class="blob"></div>
</div>

<!-- MAIN PAGE -->
<div id="mainPage">
    <h1>Quazii ❤️</h1>
    <p id="mainText"></p>

    <div id="options">
        <button onclick="startAnimation(1)">Our Moments 💕</button>
        <button onclick="startAnimation(2)">Why You ❤️</button>
        <button onclick="startAnimation(3)">My Promise 💖</button>
    </div>
</div>

<!-- SECOND PAGE -->
<div id="secondPage">
    <p id="bigMessage" class="bigText"></p>
</div>

<script>

const text = `Quazii... 💖

You're my peace...
My happiness...
My everything... ✨`;

let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("mainText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 40);
    }
}
typeEffect();

setTimeout(()=>{
    document.getElementById("options").style.display="block";
},3000);

// animation + page switch
function startAnimation(num) {

    const hand = document.createElement("div");
    hand.classList.add("hand");
    hand.innerHTML = "🤲🌹";
    document.body.appendChild(hand);

    setTimeout(()=>{
        document.getElementById("mainPage").style.opacity="0";
    },1500);

    setTimeout(()=>{
        document.getElementById("mainPage").style.display="none";
        document.getElementById("secondPage").style.display="block";

        let msg = "";

        if(num===1){
            msg = `Every moment with you feels magical... 💕

From random laughs to deep late night talks...
Every second becomes a memory I never want to lose...

With you...
Life feels beautiful... ✨`;
        }

        else if(num===2){
            msg = `I love you for the way you exist... ❤️

The way you smile...
The way you care...
The way you make my world brighter...

You're my favorite feeling... 🌸`;
        }

        else{
            msg = `I promise to stand beside you always... 💖

Through every storm...
Through every happiness...

I will choose you...
Again and again...
Every single day... ✨`;
        }

        document.getElementById("bigMessage").innerHTML = msg;

    },2500);
}

</script>

</body>
</html>
